# Backend Fleet — api-fleet.drwintech.com -> conteneur api (127.0.0.1:8012)
# HTTP + WebSocket (carte temps réel via Django Channels).
# Installer dans /etc/nginx/conf.d/ puis : certbot --nginx -d api-fleet.drwintech.com
# (certbot ajoutera automatiquement le bloc 443 + la redirection 80->443).

# Gestion de l'upgrade WebSocket (contexte http via conf.d).
map $http_upgrade $fleet_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name api-fleet.drwintech.com;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $fleet_connection_upgrade;
        proxy_read_timeout 300s;
    }
}
