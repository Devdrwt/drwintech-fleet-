# Frontend Fleet — fleet.drwintech.com -> conteneur frontend Next.js (127.0.0.1:3001)
# Installer dans /etc/nginx/conf.d/ puis : certbot --nginx -d fleet.drwintech.com
# (certbot ajoutera automatiquement le bloc 443 + la redirection 80->443).

server {
    listen 80;
    server_name fleet.drwintech.com;
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
